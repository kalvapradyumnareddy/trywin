apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:

   
      initContainers:
      - name: pull-model
        image: ollama/ollama:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Starting temporary Ollama server...";
            ollama serve &   # start server in background
            sleep 5;         # wait for server to be ready
            ollama pull llama3.2:1b;
            echo "Model llama3.2:1b pulled successfully";
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama

      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434

        env:
        - name: OLLAMA_KEEP_ALIVE
          value: "-1"
        - name: OLLAMA_NUM_THREADS
          value: "8"
        - name: OLLAMA_FLASH_ATTENTION
          value: "1"
        - name: OLLAMA_MAX_LOADED_MODELS
          value: "1"

        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama

        readinessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 10
          periodSeconds: 10

      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai-stack
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
