apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:

   
      initContainers:
      - name: pull-model
        image: ollama/ollama:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            TARGET="llama3.2:1b";
            ollama serve &
            sleep 5;
            if ollama list | grep -q "^$TARGET"; then
              echo "Model $TARGET already present, skipping pull";
            else
              ollama pull $TARGET;
              echo "Model $TARGET pulled successfully";
            fi;
            ollama list | awk 'NR>1 {print $1}' | grep -v "^$TARGET" | xargs -r -I{} sh -c 'ollama rm "{}" && echo "Removed old model: {}"';
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama

      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434

        env:
        - name: OLLAMA_KEEP_ALIVE
          value: "-1"
        - name: OLLAMA_NUM_THREADS
          value: "4"
        - name: OLLAMA_FLASH_ATTENTION
          value: "1"
        - name: OLLAMA_MAX_LOADED_MODELS
          value: "1"

        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama

        readinessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 10
          periodSeconds: 10

      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai-stack
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
