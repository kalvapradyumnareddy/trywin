apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: ai-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
      - name: openwebui
        image: ghcr.io/open-webui/open-webui:latest
        ports:
        - containerPort: 8080
        env:
        - name: OPENAI_API_BASE_URLS
          value: "http://rag-api:8000/v1"
        - name: OPENAI_API_KEYS
          value: "rag-not-needed"
        - name: ENABLE_OLLAMA_API
          value: "false"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            cpu: "1"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: ai-stack
spec:
  selector:
    app: openwebui
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
