server {
    listen 80;
    server_name _;

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # Main access log (default nginx format)
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Serve static site
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets (good for mobile)
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Anonymous click tracking endpoint
    location /track {
        access_log /var/log/nginx/track.log;
        return 204;
    }

    # Gzip compression (mobile networks)
    gzip on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;
}

