name: Build and Push RAG Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "RAG/app/**"
      - "RAG/upload-ui/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rag-api
            context: RAG/app
            image: pradyumnareddy/rag-api
            cache_scope: rag-api
          - name: rag-upload-ui
            context: RAG/upload-ui
            image: pradyumnareddy/rag-upload-ui
            cache_scope: rag-upload-ui-v2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set version
        id: version
        run: echo "VERSION=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build and Push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          tags: |
            ${{ matrix.image }}:${{ steps.version.outputs.VERSION }}
            ${{ matrix.image }}:latest
