name: Build and Push RAG Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "RAG/app/**"
  workflow_dispatch:

jobs:
  build-rag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set version
        id: version
        run: echo "VERSION=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build and Push RAG API
        uses: docker/build-push-action@v5
        with:
          context: RAG/app
          push: true
          cache-from: type=gha,scope=rag-api
          cache-to: type=gha,mode=max,scope=rag-api
          tags: |
            pradyumnareddy/rag-api:${{ steps.version.outputs.VERSION }}
            pradyumnareddy/rag-api:latest
