server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100m;

    # Use Kubernetes internal DNS so nginx resolves the upstream at
    # request time instead of startup — avoids "host not found" crash
    # when rag-api isn't up yet or starts after upload-ui.
    resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        set $rag http://rag-api.ai-stack.svc.cluster.local:8000;
        proxy_pass         $rag/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100m;
    }
}
